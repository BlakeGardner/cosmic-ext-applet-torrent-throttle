id: io.github.BlakeGardner.cosmic-ext-applet-torrent-throttle
runtime: org.freedesktop.Platform
runtime-version: "25.08"
base: com.system76.Cosmic.BaseApp
base-version: stable
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-ext-applet-torrent-throttle
finish-args:
  - --share=ipc
  # qBittorrent Web API access
  - --share=network
  - --socket=wayland
  - --talk-name=com.system76.CosmicSettingsDaemon
  - --filesystem=xdg-config/cosmic:rw
  # Host process monitoring via `flatpak-spawn --host ps` (sandboxes have
  # their own PID namespace, so sysinfo cannot see host processes). Same
  # pattern as other applets in the COSMIC Flatpak repo (e.g. minimon).
  - --talk-name=org.freedesktop.Flatpak
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/cosmic-ext-applet-torrent-throttle/cargo
modules:
  - name: cosmic-ext-applet-torrent-throttle
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/cosmic-ext-applet-torrent-throttle/cargo
    build-commands:
      - just vendor-extract
      - just build-vendored
      - just prefix=/app install
    sources:
      - cargo-sources.json
      - type: git
        url: https://github.com/BlakeGardner/cosmic-ext-applet-torrent-throttle.git
        tag: RELEASE_TAG
