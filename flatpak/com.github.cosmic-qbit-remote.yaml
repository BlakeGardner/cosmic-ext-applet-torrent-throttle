id: com.github.cosmic-qbit-remote
runtime: org.freedesktop.Platform
runtime-version: "25.08"
base: com.system76.Cosmic.BaseApp
base-version: stable
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-qbit-remote
finish-args:
  - --share=ipc
  # qBittorrent Web API access
  - --share=network
  - --socket=wayland
  - --talk-name=com.system76.CosmicSettingsDaemon
  - --filesystem=xdg-config/cosmic:rw
  # NOTE: Flatpak sandboxes use their own PID namespace, so sysinfo cannot
  # see host processes. Before publishing a flatpak, process monitoring must
  # be ported to `flatpak-spawn --host` (requires
  # --talk-name=org.freedesktop.Flatpak) when running inside a sandbox.
  - --talk-name=org.freedesktop.Flatpak
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/cosmic-qbit-remote/cargo
modules:
  - name: cosmic-qbit-remote
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/cosmic-qbit-remote/cargo
    build-commands:
      - just vendor-extract
      - just build-vendored
      - just prefix=/app install
    sources:
      - cargo-sources.json
      - type: git
        url: https://github.com/YOUR_USERNAME/cosmic-qbit-remote.git
        tag: RELEASE_TAG
