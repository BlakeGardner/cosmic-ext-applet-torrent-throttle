name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --locked
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-ext-applet-torrent-throttle-linux-x86_64
          path: target/release/cosmic-ext-applet-torrent-throttle

  flatpak:
    name: Build flatpak bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder ostree python3-aiohttp python3-tomlkit
      - name: Install flatpak SDKs
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --noninteractive --user flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08 \
            com.system76.Cosmic.BaseApp//stable
      - name: Generate cargo-sources.json
        run: |
          curl -fLo flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 flatpak-cargo-generator.py Cargo.lock -o flatpak/cargo-sources.json
      - name: Pin manifest to release commit
        run: |
          sed -i "s/RELEASE_COMMIT/${GITHUB_SHA}/" \
            flatpak/io.github.BlakeGardner.cosmic-ext-applet-torrent-throttle.json
      - name: Build flatpak
        run: |
          flatpak-builder --verbose --force-clean --sandbox --user \
            --install-deps-from=flathub --repo=repo \
            flatpak-out flatpak/io.github.BlakeGardner.cosmic-ext-applet-torrent-throttle.json
      - name: Create flatpak bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          flatpak build-bundle repo \
            cosmic-ext-applet-torrent-throttle-${VERSION}.flatpak \
            io.github.BlakeGardner.cosmic-ext-applet-torrent-throttle
      - name: Upload flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: cosmic-ext-applet-torrent-throttle-*.flatpak
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, flatpak]
    steps:
      - uses: actions/checkout@v4
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: cosmic-ext-applet-torrent-throttle-linux-x86_64
          path: artifacts/
      - name: Download flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: artifacts/
      - name: Make binary executable
        run: chmod +x artifacts/cosmic-ext-applet-torrent-throttle
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cosmic-ext-applet-torrent-throttle
            artifacts/cosmic-ext-applet-torrent-throttle-*.flatpak
