name: Flatpak cargo-sources

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  generate-sources:
    name: Generate cargo-sources.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install flatpak-cargo-generator dependencies
        run: pip install aiohttp toml
      - name: Download flatpak-cargo-generator
        run: |
          curl -fLo flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
      - name: Generate cargo-sources.json
        run: python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json
      - name: Upload cargo-sources.json
        uses: actions/upload-artifact@v4
        with:
          name: cargo-sources
          path: cargo-sources.json
